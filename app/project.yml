name: RubiksCubeSolver
options:
  bundleIdPrefix: com.pathe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  RubiksCubeSolver:
    type: application
    platform: iOS
    sources:
      - path: RubiksCubeSolver
    resources:
      - path: RubiksCubeSolver/Resources/Assets.xcassets
    info:
      path: RubiksCubeSolver/App/Info.plist
      properties:
        CFBundleDisplayName: Cube Solver
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: >-
          Cube Solver needs the camera to see your Rubik's cube so it can
          identify the sticker colors on each face and guide you through the
          solve.
        NSMicrophoneUsageDescription: >-
          Not used. Present only because AVFoundation's camera capture session
          may initialize audio inputs on some devices.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pathe.RubiksCubeSolver
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
  RubiksCubeSolverTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RubiksCubeSolverTests
    dependencies:
      - target: RubiksCubeSolver
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pathe.RubiksCubeSolverTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  RubiksCubeSolver:
    build:
      targets:
        RubiksCubeSolver: all
        RubiksCubeSolverTests: [test]
    test:
      targets:
        - RubiksCubeSolverTests
    run:
      config: Debug
    archive:
      config: Release
